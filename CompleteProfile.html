<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete Profile</title>

    <link rel="icon" type="image/x-icon" href="images/logo.png">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="profile-page">
    <div class="profile-card">
        <div class="profile-left">
            <h1>Complete Your Profile 👤</h1>
            <p>
                Tell people who you are, what you study, and what goals you are working on.
            </p>

            <div class="profile-preview">
                <div class="avatar-preview" id="avatarPreview">📷</div>
                <h2 id="previewName">Your Profile</h2>
                <p id="previewBio">Your bio will appear here...</p>
            </div>
        </div>

        <form id="profileForm" class="profile-form">
            <div class="form-row">
                <div class="form-group">
                    <label>Gender</label>
                    <select id="gender" required>
                        <option value="">Select Gender</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Education Level</label>
                    <select id="education" required>
                        <option value="">Education Level</option>
                        <option value="University">University</option>
                        <option value="High School">High School</option>
                        <option value="Middle School">Middle School</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>Major / Specialization</label>
                <input type="text" id="major" placeholder="Computer Science, Medicine, Engineering...">
            </div>

            <div class="form-group">
                <label>Bio</label>
                <textarea id="bio" placeholder="Write something about yourself..." required></textarea>
            </div>

            <div class="form-group">
                <label>Your Goals</label>
                <textarea id="goals" placeholder="Example: Finish 3 chapters today, improve my GPA, study 4 hours daily..."></textarea>
            </div>

            <div class="form-group">
                <label>Profile Picture</label>
                <input type="file" id="profileImage" accept="image/*">
            </div>

            <button type="submit">Save Profile</button>
            <p id="error"></p>
        </form>
    </div>
</div>
</html>
